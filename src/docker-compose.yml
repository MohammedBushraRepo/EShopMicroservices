services:
  catalogdb:
    image: postgres:17
    platform: linux/amd64

  basketdb:
    image: postgres:17
    platform: linux/amd64

  catalog.api:
    image: ${DOCKER_REGISTRY-}catalogapi
    build:
      context: .
      dockerfile: Services/Catalog/CatalogAPI/Dockerfile
  

volumes:
  postgres_catalog:
  postgres_basket: